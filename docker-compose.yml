services:
  backend:
    build:
      context: ./Back
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    env_file:
      - ./Back/.env

    environment:
      PYTHONUNBUFFERED: "1"

  frontend:
    build:
      context: ./Front/eduvoice-front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_APP_ENV: ${VITE_APP_ENV}
        VITE_DEBUG: ${VITE_DEBUG}

    ports:
      - "8080:80"

    depends_on:
      - backend